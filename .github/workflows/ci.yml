name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20.19.0, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.5
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - name: Verify tracked Action bundle is current
        if: runner.os == 'Linux' && matrix.node == '20.19.0'
        run: git diff --exit-code -- packages/action/dist/index.cjs

  self-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.5
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm context-ray scan . --agent codex --target packages/core --format sarif --output .context-ray/report.sarif --fail-on error
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: context-ray-sarif
          path: .context-ray/report.sarif

  action-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: context-ray
        uses: ./
        with:
          root: fixtures/sample-repo
          target: services/payments
          agent: codex
          fail-on: none
          output-directory: .context-ray-action
      - name: Verify packaged Action outputs
        shell: bash
        run: |
          test -s fixtures/sample-repo/.context-ray-action/report.json
          test -s fixtures/sample-repo/.context-ray-action/report.sarif
          test -s fixtures/sample-repo/.context-ray-action/summary.md
          test -n "${{ steps.context-ray.outputs.effective-tokens }}"
          test -n "${{ steps.context-ray.outputs.report }}"
